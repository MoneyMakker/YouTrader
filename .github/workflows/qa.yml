name: QA

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: TypeScript
        run: npm run typecheck
      - name: Security check
        run: npm run security:check
      - name: npm audit
        run: npm audit --audit-level=high
      - name: Expo doctor optional
        continue-on-error: true
        run: npx expo-doctor
