appId: com.youtrader.pro
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible: "Journal"
    timeout: 20000
- tapOn: "Journal"
- assertVisible: "TRADES TODAY.*"
- tapOn:
    text: "[0-9]+"
    index: 0
- extendedWaitUntil:
    visible: "Save Trade"
    timeout: 10000
- tapOn: "Custom Symbol"
- eraseText
- inputText: "MES"
- hideKeyboard
- scrollUntilVisible:
    element: "P&L"
    direction: DOWN
- tapOn: "P&L"
- inputText: "12"
- hideKeyboard
- tapOn: "Save Trade"
- extendedWaitUntil:
    visible: "MES"
    timeout: 10000
- tapOn: "MES"
- extendedWaitUntil:
    visible: "Update Trade"
    timeout: 10000
- tapOn: "Close"
- assertVisible: "MES"

