appId: com.youtrader.pro
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible: "News"
    timeout: 20000
- tapOn: "News"
- extendedWaitUntil:
    visible: ".*"
    timeout: 15000
- assertVisible: "News"
- tapOn: "AI Analytics"
- extendedWaitUntil:
    visible: "Daily Brief|Market Summary|Unlock AI Analytics|YouTrader Pro"
    timeout: 15000
- assertVisible: "AI Analytics"

